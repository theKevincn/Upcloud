<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DARKDROP | NAVIN CHAUDHARY</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root {
            --primary: #ffffff;
            --primary-hover: #e2e8f0;
            --bg-main: #000000;
            --bg-card: rgba(10, 10, 10, 0.9);
            --border: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --text-muted: #666666;
            --accent: #3b82f6;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Space Grotesk', sans-serif; }

        body {
            min-height: 100vh;
            background: var(--bg-main);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        #particle-canvas {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .card {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            padding: 2.5rem;
            width: 90%;
            max-width: 420px;
            z-index: 1;
            position: relative;
            text-align: center;
            border-radius: 4px;
        }

        header { margin-bottom: 2rem; }
        h1 { font-size: 1.6rem; font-weight: 700; letter-spacing: 6px; text-transform: uppercase; color: var(--primary); }
        .tagline { font-size: 0.65rem; color: var(--text-muted); margin-top: 8px; letter-spacing: 4px; }

        button {
            width: 100%;
            padding: 1rem;
            margin-top: 1rem;
            background: var(--primary);
            color: #000;
            border: none;
            font-weight: 700;
            cursor: pointer;
            font-size: 0.8rem;
            text-transform: uppercase;
            transition: 0.3s;
            letter-spacing: 2px;
        }
        button:hover { background: var(--primary-hover); transform: translateY(-2px); }
        
        .btn-outline {
            background: transparent;
            color: var(--text-main);
            border: 1px solid var(--border);
        }
        .btn-outline:hover { border-color: var(--primary); background: rgba(255,255,255,0.05); }

        input {
            width: 100%;
            padding: 1rem;
            margin-top: 1rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            color: #fff;
            text-align: center;
            font-size: 1.2rem;
            outline: none;
        }

        .pin-box {
            font-size: 3rem;
            font-weight: 700;
            color: var(--accent);
            margin: 1rem 0;
            letter-spacing: 8px;
        }

        .status-text { font-size: 0.7rem; color: var(--text-muted); margin-top: 10px; letter-spacing: 1px; }

        .footer {
            margin-top: 2rem;
            font-size: 0.7rem;
            color: var(--text-muted);
            z-index: 1;
            letter-spacing: 1px;
        }
        .footer span { color: #ff3e3e; }
    </style>
</head>
<body>

    <canvas id="particle-canvas"></canvas>

    <div class="card">
        <header>
            <h1>DARKDROP</h1>
            <p class="tagline">P2P SECURE TERMINAL</p>
        </header>

        <div id="home-screen">
            <button onclick="initSend()">SEND DATA</button>
            <button class="btn-outline" onclick="initReceive()">RECEIVE DATA</button>
        </div>

        <div id="receive-screen" style="display:none;">
            <p class="status-text">YOUR TERMINAL PIN:</p>
            <div class="pin-box" id="my-pin">-----</div>
            <p class="status-text" id="receive-status">WAITING FOR LINK...</p>
        </div>

        <div id="send-screen" style="display:none;">
            <input type="number" id="target-pin" placeholder="ENTER PIN">
            <button onclick="connectToPeer()">ESTABLISH LINK</button>
            <p class="status-text" id="send-status">READY TO CONNECT</p>
        </div>

        <div id="workspace" style="display:none;">
            <p style="font-size: 0.75rem; color: var(--accent); margin-bottom: 1rem;">LINK ESTABLISHED</p>
            <input type="file" id="file-input" style="font-size: 0.8rem;">
            <button id="send-btn" onclick="sendFile()">PUSH FILE</button>
            <p class="status-text" id="transfer-status"></p>
        </div>
    </div>

    <div class="footer">
        PROJECT DARKDROP // BY <span>❤</span> NAVIN CHAUDHARY
    </div>

    <script>
        // PWA
        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }

        // Background Particles
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        let particles = [];
        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.speedX = Math.random() * 0.5 - 0.25;
                this.speedY = Math.random() * 0.5 - 0.25;
            }
            update() {
                this.x += this.speedX; this.y += this.speedY;
                if (this.x > canvas.width) this.x = 0; else if (this.x < 0) this.x = canvas.width;
                if (this.y > canvas.height) this.y = 0; else if (this.y < 0) this.y = canvas.height;
            }
            draw() {
                ctx.fillStyle = 'rgba(255, 255, 255, 0.15)';
                ctx.beginPath(); ctx.arc(this.x, this.y, 1, 0, Math.PI * 2); ctx.fill();
            }
        }
        for (let i = 0; i < 60; i++) particles.push(new Particle());
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }
        animate();

        // P2P Logic
        let peer, conn;
        const peerOptions = { 
            debug: 1, 
            secure: true,
            port: 443,
            host: '0.peerjs.com'
        };

        function initSend() {
            document.getElementById('home-screen').style.display = 'none';
            document.getElementById('send-screen').style.display = 'block';
            peer = new Peer(peerOptions);
        }

        function initReceive() {
            document.getElementById('home-screen').style.display = 'none';
            document.getElementById('receive-screen').style.display = 'block';
            const pin = Math.floor(10000 + Math.random() * 90000).toString();
            peer = new Peer(pin, peerOptions);
            peer.on('open', id => { document.getElementById('my-pin').innerText = id; });
            peer.on('connection', c => { conn = c; setupConn(); });
        }

        function connectToPeer() {
            const pin = document.getElementById('target-pin').value;
            if(pin.length !== 5) return alert("Enter 5-digit PIN");
            document.getElementById('send-status').innerText = "LINKING...";
            conn = peer.connect(pin);
            setupConn();
        }

        function setupConn() {
            conn.on('open', () => {
                document.getElementById('receive-screen').style.display = 'none';
                document.getElementById('send-screen').style.display = 'none';
                document.getElementById('workspace').style.display = 'block';
            });
            conn.on('data', data => {
                if(data.file) {
                    const b = new Blob([data.file]);
                    const a = document.createElement('a');
                    a.href = URL.createObjectURL(b);
                    a.download = data.name;
                    a.click();
                    document.getElementById('transfer-status').innerText = "RECEIVED: " + data.name;
                }
            });
        }

        function sendFile() {
            const f = document.getElementById('file-input').files[0];
            if(!f) return;
            document.getElementById('send-btn').innerText = "PUSHING...";
            conn.send({ file: f, name: f.name });
            setTimeout(() => {
                document.getElementById('send-btn').innerText = "DATA PUSHED";
                document.getElementById('transfer-status').innerText = "SUCCESSFULLY SENT: " + f.name;
            }, 1000);
        }
    </script>
</body>
</html>
